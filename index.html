<!-- ============================================================
  WIDGET IA — colle ce bloc juste avant la balise </body>
  dans ton index.html
=============================================================== -->

<!-- Bouton flottant -->
<button id="ia-toggle" onclick="toggleIA()" title="Aide IA">
  🤖 IA
</button>

<!-- Fenêtre de chat -->
<div id="ia-panel">
  <div id="ia-header">
    <span>🤖 Assistant IA</span>
    <button onclick="toggleIA()" id="ia-close">✕</button>
  </div>
  <div id="ia-messages">
    <div class="ia-msg ia-ai">
      Salut ! Je suis l'assistant IA de ce panel. Je peux t'expliquer comment utiliser le panel, gérer tes serveurs Minecraft, les permissions, les commandes... Pose-moi n'importe quelle question ! ⛏️
    </div>
  </div>
  <div id="ia-input-area">
    <input type="text" id="ia-input" placeholder="Ex: Comment démarrer un serveur ?" onkeydown="if(event.key==='Enter') sendIA()" />
    <button onclick="sendIA()" id="ia-send">➤</button>
  </div>
</div>

<style>
  #ia-toggle {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #16a34a;
    color: white;
    border: none;
    border-radius: 50px;
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(22,163,74,0.4);
    z-index: 9999;
    transition: transform 0.2s, opacity 0.2s;
  }
  #ia-toggle:hover { transform: scale(1.05); }

  #ia-panel {
    display: none;
    position: fixed;
    bottom: 80px;
    right: 24px;
    width: 360px;
    height: 480px;
    background: #1a1a2e;
    border: 1px solid #2d2d4e;
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    z-index: 9998;
    flex-direction: column;
    overflow: hidden;
  }
  #ia-panel.open { display: flex; }

  #ia-header {
    background: #16a34a;
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 700;
    color: white;
    font-size: 14px;
    flex-shrink: 0;
  }
  #ia-close {
    background: none;
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
  }

  #ia-messages {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scrollbar-width: thin;
    scrollbar-color: #2d2d4e transparent;
  }

  .ia-msg {
    padding: 10px 13px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.55;
    max-width: 90%;
    white-space: pre-wrap;
  }
  .ia-ai {
    background: #242444;
    border: 1px solid #2d2d4e;
    align-self: flex-start;
    border-bottom-left-radius: 3px;
    color: #e2e8f0;
  }
  .ia-user {
    background: #15532e;
    border: 1px solid #166534;
    align-self: flex-end;
    border-bottom-right-radius: 3px;
    color: #dcfce7;
  }
  .ia-typing {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 12px 14px;
  }
  .ia-typing span {
    width: 6px; height: 6px;
    background: #16a34a;
    border-radius: 50%;
    animation: iabounce 1.2s infinite;
  }
  .ia-typing span:nth-child(2) { animation-delay: 0.2s; }
  .ia-typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes iabounce {
    0%,60%,100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  #ia-input-area {
    display: flex;
    gap: 8px;
    padding: 12px;
    border-top: 1px solid #2d2d4e;
    flex-shrink: 0;
    background: #1a1a2e;
  }
  #ia-input {
    flex: 1;
    background: #242444;
    border: 1px solid #2d2d4e;
    border-radius: 8px;
    padding: 8px 12px;
    color: #e2e8f0;
    font-size: 13px;
    outline: none;
  }
  #ia-input:focus { border-color: #16a34a; }
  #ia-input::placeholder { color: #4a5568; }
  #ia-send {
    background: #16a34a;
    border: none;
    border-radius: 8px;
    color: white;
    padding: 8px 14px;
    cursor: pointer;
    font-size: 16px;
    transition: opacity 0.15s;
  }
  #ia-send:hover { opacity: 0.85; }
  #ia-send:disabled { opacity: 0.4; cursor: not-allowed; }
</style>

<script>
  const iaHistory = [];
  let iaLoading = false;

  function toggleIA() {
    const panel = document.getElementById('ia-panel');
    panel.classList.toggle('open');
    if (panel.classList.contains('open')) {
      document.getElementById('ia-input').focus();
    }
  }

  function iaAddMsg(role, text) {
    const box = document.getElementById('ia-messages');
    const div = document.createElement('div');
    div.className = `ia-msg ${role === 'user' ? 'ia-user' : 'ia-ai'}`;
    div.textContent = text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
    return div;
  }

  function iaShowTyping() {
    const box = document.getElementById('ia-messages');
    const div = document.createElement('div');
    div.className = 'ia-msg ia-ai ia-typing';
    div.id = 'ia-typing';
    div.innerHTML = '<span></span><span></span><span></span>';
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  function iaRemoveTyping() {
    const el = document.getElementById('ia-typing');
    if (el) el.remove();
  }

  async function sendIA() {
    const input = document.getElementById('ia-input');
    const text = input.value.trim();
    if (!text || iaLoading) return;

    iaAddMsg('user', text);
    iaHistory.push({ role: 'user', content: text });
    input.value = '';
    iaLoading = true;
    document.getElementById('ia-send').disabled = true;
    iaShowTyping();

    try {
      const res = await fetch('/api/ia', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: iaHistory })
      });
      const data = await res.json();
      iaRemoveTyping();

      if (data.reply) {
        iaAddMsg('ai', data.reply);
        iaHistory.push({ role: 'assistant', content: data.reply });
      } else {
        iaAddMsg('ai', '❌ Erreur : ' + (data.error || 'Réponse invalide'));
      }
    } catch (err) {
      iaRemoveTyping();
      iaAddMsg('ai', '❌ Impossible de contacter l\'IA.');
    }

    iaLoading = false;
    document.getElementById('ia-send').disabled = false;
    input.focus();
  }
</script>
